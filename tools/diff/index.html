  <link rel="stylesheet" href="../../tools/diff/diff.css">

  <!-- @partial:theme-bootstrap -->
  <script>
    (function(){
      var d=document.documentElement;
      try{
        var saved=localStorage.getItem('theme');
        if(saved==='light'||saved==='dark') d.setAttribute('data-theme',saved);
        else if(matchMedia('(prefers-color-scheme:dark)').matches) d.setAttribute('data-theme','dark');
      }catch(e){
        if(matchMedia('(prefers-color-scheme:dark)').matches) d.setAttribute('data-theme','dark');
      }
    })();
  </script>
  <!-- @end -->
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <div class="site-wrapper">

    <header class="site-header">
      <a href="../../index.html" class="logo-link" aria-label="Home">
        <svg class="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="24" cy="24" r="21.5" stroke="currentColor" stroke-width="1.05"/>
          <circle cx="24" cy="24" r="13" stroke="currentColor" stroke-width="0.75" opacity="0.55"/>
          <text x="24" y="29" text-anchor="middle" dominant-baseline="auto" font-family="'Crimson Pro', Georgia, serif" font-style="italic" font-size="16" font-weight="300" fill="currentColor" stroke="none">p</text>
        </svg>
        <svg class="logo-wordmark" aria-label="priyansu s." role="img" viewBox="0 0 120 28" preserveAspectRatio="xMinYMid meet" xmlns="http://www.w3.org/2000/svg"><text x="0" y="22" fill="currentColor" font-family="'Caveat', 'Brush Script MT', cursive" font-size="22" font-weight="500">priyansu s.</text></svg>
      </a>

      <nav class="header-nav" aria-label="Primary">
        <a href="../../tools/index.html" class="nav-link nav-link--back">&larr; tools</a>
        <a href="../../gallery/index.html" class="nav-link">gallery</a>
        <a href="../../writing/index.html" class="nav-link">writing</a>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </nav>
    </header>

    <main id="main">

      <div class="diff-header">
        <h1>diff checker</h1>
        <p>Paste two texts below and compare.</p>
      </div>

      <div class="diff-inputs">
        <div class="diff-pane">
          <label class="diff-label" for="text-a">text 1</label>
          <textarea id="text-a" class="diff-textarea" placeholder="Paste text 1 here…" spellcheck="false"></textarea>
        </div>
        <div class="diff-pane">
          <label class="diff-label" for="text-b">text 2</label>
          <textarea id="text-b" class="diff-textarea" placeholder="Paste text 2 here…" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="diff-toolbar">
        <button class="diff-btn" id="compare-btn">compare</button>
        <button class="diff-btn diff-btn--ghost" id="clear-btn">clear</button>
        <span class="diff-stats" id="diff-stats" aria-live="polite" aria-atomic="true"></span>
      </div>

      <div class="diff-output" id="diff-output"></div>

    </main>

    <!-- @partial:footer -->
    <footer class="site-footer">
      <div class="footer-rail" aria-hidden="true">✦</div>
      <div class="footer-content">
        <div class="footer-line">
          <span>© priyansu s.</span>
          <span class="dot" aria-hidden="true">·</span>
          <span>2026</span>
        </div>
        <div class="footer-colophon">
          built and photographed by priyansu
        </div>
      </div>
    </footer>
    <!-- @end -->

  </div>

  <script src="../../app.js" defer></script>
  <script src="../../tools/diff/diff.js" defer></script>
