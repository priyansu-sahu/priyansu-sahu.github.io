<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="referrer" content="strict-origin-when-cross-origin">

  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/png" href="../../assets/favicon.png">
  <link rel="apple-touch-icon" href="../../assets/favicon.png">

  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../../base.css">
  <link rel="stylesheet" href="../../style.css">
  <link rel="stylesheet" href="wordcount.css">

  <!-- @partial:theme-bootstrap -->
  <script>
    (function(){
      var d=document.documentElement;
      try{
        var saved=localStorage.getItem('theme');
        if(saved==='light'||saved==='dark') d.setAttribute('data-theme',saved);
        else if(matchMedia('(prefers-color-scheme:dark)').matches) d.setAttribute('data-theme','dark');
      }catch(e){
        if(matchMedia('(prefers-color-scheme:dark)').matches) d.setAttribute('data-theme','dark');
      }
    })();
  </script>
  <!-- @end -->
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  <div class="site-wrapper">

    <header class="site-header">
      <a href="../../index.html" class="logo-link" aria-label="Home">
        <svg class="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="24" cy="24" r="21.5" stroke="currentColor" stroke-width="1.05"/>
          <circle cx="24" cy="24" r="13" stroke="currentColor" stroke-width="0.75" opacity="0.55"/>
          <text x="24" y="29" text-anchor="middle" dominant-baseline="auto" font-family="'Crimson Pro', Georgia, serif" font-style="italic" font-size="16" font-weight="300" fill="currentColor" stroke="none">p</text>
        </svg>
        <svg class="logo-wordmark" aria-label="priyansu s." role="img" viewBox="0 0 120 28" preserveAspectRatio="xMinYMid meet" xmlns="http://www.w3.org/2000/svg"><text x="0" y="22" fill="currentColor" font-family="'Caveat', 'Brush Script MT', cursive" font-size="22" font-weight="500">priyansu s.</text></svg>
      </a>

      <nav class="header-nav" aria-label="Primary">
        <a href="../../tools/index.html" class="nav-link nav-link--back">&larr; tools</a>
        <a href="../../gallery/index.html" class="nav-link">gallery</a>
        <a href="../../writing/index.html" class="nav-link">writing</a>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </nav>
    </header>

    <main id="main">

      <div class="wc-header">
        <h1>word counter</h1>
        <p>Type or paste your text below.</p>
      </div>

      <div class="wc-stats" id="wc-stats">
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-words">0</span>
          <span class="wc-stat-label">words</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-chars">0</span>
          <span class="wc-stat-label">characters</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-chars-no-spaces">0</span>
          <span class="wc-stat-label">no spaces</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-lines">0</span>
          <span class="wc-stat-label">lines</span>
        </div>
        <div class="wc-stat-divider"></div>
        <div class="wc-stat">
          <span class="wc-stat-value" id="stat-sentences">0</span>
          <span class="wc-stat-label">sentences</span>
        </div>

      </div>

      <div class="sr-only" id="wc-announce" aria-live="polite" aria-atomic="true"></div>

      <textarea
        id="wc-input"
        class="wc-textarea"
        placeholder="Start typing or paste your text here…"
        spellcheck="false"
        aria-label="Text input for word counting"
      ></textarea>

      <button class="diff-btn diff-btn--ghost" id="wc-clear">clear</button>

    </main>

    <!-- @partial:footer -->
    <footer class="site-footer">
      <div class="footer-rail" aria-hidden="true">✦</div>
      <div class="footer-content">
        <div class="footer-line">
          <span>© priyansu s.</span>
          <span class="dot" aria-hidden="true">·</span>
          <span>2026</span>
        </div>
        <div class="footer-colophon">
          built and photographed by priyansu
        </div>
      </div>
    </footer>
    <!-- @end -->

  </div>

  <script src="../../app.js" defer></script>
  <script src="wordcount.js" defer></script>
</body>
</html>
